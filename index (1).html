<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Tareas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F5F2EC;
    --surface:   #FDFAF5;
    --border:    #E2DDD4;
    --text:      #1C1917;
    --muted:     #78716C;
    --accent:    #C4522A;
    --accent-lt: #F5E6DF;

    --todo-bg:   #EDF2FB;
    --todo-bd:   #A8BFEE;
    --todo-hd:   #2C5FBF;

    --wip-bg:    #FEF3E2;
    --wip-bd:    #F0BC72;
    --wip-hd:    #9A5A06;

    --done-bg:   #E8F5EE;
    --done-bd:   #82C99E;
    --done-hd:   #1F6B40;

    --radius:    10px;
    --shadow:    0 2px 8px rgba(0,0,0,.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    letter-spacing: -.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); font-style: italic; }

  /* ── FORMULARIO ────────────────────────────── */
  .add-form {
    display: flex;
    gap: 8px;
    flex: 1;
    max-width: 680px;
    flex-wrap: wrap;
  }

  .add-form input[type="text"] {
    flex: 1;
    min-width: 160px;
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }
  .add-form input[type="text"]:focus { border-color: var(--accent); }
  .add-form input[type="text"]::placeholder { color: var(--muted); }

  .add-form select {
    padding: 9px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    outline: none;
  }

  /* ── SELECTOR DE PRIORIDAD ─────────────────── */
  .priority-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .priority-wrap label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .priority-wrap input[type="number"] {
    width: 52px;
    padding: 9px 8px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    outline: none;
    transition: border-color .15s;
    -moz-appearance: textfield;
  }
  .priority-wrap input[type="number"]::-webkit-inner-spin-button,
  .priority-wrap input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .priority-wrap input[type="number"]:focus { border-color: var(--accent); }

  .btn-add {
    padding: 9px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s, transform .1s;
  }
  .btn-add:hover { opacity: .88; }
  .btn-add:active { transform: scale(.97); }

  /* ── BARRA INFERIOR DEL HEADER ─────────────── */
  .subbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 32px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .summary {
    font-size: 12px;
    color: var(--muted);
  }

  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* ── TABLERO ───────────────────────────────── */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px 32px 40px;
  }

  @media (max-width: 760px) {
    .board { grid-template-columns: 1fr; }
    .add-form { max-width: 100%; }
    header { padding: 16px 20px; }
    .subbar { padding: 8px 20px 10px; }
    .board { padding: 16px 20px 40px; }
  }

  /* ── COLUMNA ───────────────────────────────── */
  .column {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 200px;
    transition: box-shadow .2s;
  }
  .column.drag-over {
    box-shadow: 0 0 0 2.5px var(--accent), var(--shadow);
  }

  .col-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
    border-bottom: 1.5px solid var(--border);
  }

  .col-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  [data-col="todo"]     .col-dot { background: var(--todo-hd); }
  [data-col="progress"] .col-dot { background: var(--wip-hd); }
  [data-col="done"]     .col-dot { background: var(--done-hd); }

  .col-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    letter-spacing: -.3px;
  }
  [data-col="todo"]     .col-title { color: var(--todo-hd); }
  [data-col="progress"] .col-title { color: var(--wip-hd); }
  [data-col="done"]     .col-title { color: var(--done-hd); }

  .col-count {
    margin-left: auto;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }
  [data-col="todo"]     .col-count { background: var(--todo-bg);  color: var(--todo-hd); }
  [data-col="progress"] .col-count { background: var(--wip-bg);   color: var(--wip-hd); }
  [data-col="done"]     .col-count { background: var(--done-bg);  color: var(--done-hd); }

  /* ── LISTA DE TAREAS ───────────────────────── */
  .task-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .empty-hint {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 20px 0;
    font-style: italic;
  }

  /* ── TARJETA ───────────────────────────────── */
  .task-card {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 10px 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: grab;
    transition: box-shadow .15s, transform .15s, opacity .15s;
    animation: cardIn .18s ease both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-card:hover {
    box-shadow: var(--shadow);
    border-color: #C9C3BA;
  }
  .task-card.dragging {
    opacity: .45;
    transform: scale(.97);
    cursor: grabbing;
  }
  /* borde izquierdo rojo para prioridad crítica */
  .task-card.crit-border {
    border-left: 3px solid #B91C1C;
  }

  /* ── BADGE DE PRIORIDAD ────────────────────── */
  .priority-badge {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    line-height: 1;
    margin-top: 1px;
    cursor: default;
  }
  .pri-low  { background: #E6F2EA; color: #276840; border: 1.5px solid #A8D5B5; }
  .pri-mid  { background: #FEF3E2; color: #8A5100; border: 1.5px solid #F0BC72; }
  .pri-high { background: #FDEEE7; color: #A53A10; border: 1.5px solid #F0A07A; }
  .pri-crit { background: #B91C1C; color: #fff;    border: 1.5px solid #991A1A; }

  /* cuerpo de la tarjeta */
  .task-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }

  .task-text {
    font-size: 14px;
    line-height: 1.45;
    word-break: break-word;
  }
  .task-card.is-done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }
  .task-card.is-done .priority-badge { opacity: .35; }

  .priority-label {
    font-size: 11px;
    color: var(--muted);
  }
  .task-card.is-done .priority-label { opacity: .5; }

  /* controles */
  .card-controls {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }

  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 5px;
    font-size: 13px;
    line-height: 1;
    color: var(--muted);
    transition: background .12s, color .12s;
  }
  .btn-icon:hover { background: var(--border); color: var(--text); }
  .btn-del:hover  { background: #FDECEA; color: #B91C1C; }

  /* ── MENÚ MOVER ────────────────────────────── */
  .move-menu { position: relative; }
  .move-dropdown {
    display: none;
    position: absolute;
    right: 0; top: 24px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 6px 20px rgba(0,0,0,.12);
    z-index: 100;
    min-width: 150px;
    overflow: hidden;
  }
  .move-dropdown.open { display: block; }
  .move-opt {
    display: block; width: 100%;
    padding: 9px 14px;
    background: none; border: none;
    font-family: inherit; font-size: 13px;
    text-align: left; cursor: pointer;
    color: var(--text);
    transition: background .1s;
  }
  .move-opt:hover { background: var(--bg); }
  .move-opt.current { color: var(--muted); pointer-events: none; }

  /* ── MENÚ PRIORIDAD ────────────────────────── */
  .pri-menu { position: relative; }
  .pri-dropdown {
    display: none;
    position: absolute;
    right: 0; top: 24px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 6px 20px rgba(0,0,0,.12);
    z-index: 101;
    padding: 8px;
    width: 176px;
  }
  .pri-dropdown.open { display: block; }
  .pri-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }
  .pri-btn {
    padding: 7px 0;
    border-radius: 5px;
    border: 1.5px solid transparent;
    font-family: inherit;
    font-size: 12px; font-weight: 500;
    cursor: pointer; text-align: center;
    transition: transform .1s;
  }
  .pri-btn:hover { transform: scale(1.12); }
  .pri-btn.active { outline: 2px solid var(--text); outline-offset: 1px; }
  .pri-btn.p-low  { background: #E6F2EA; color: #276840; border-color: #A8D5B5; }
  .pri-btn.p-mid  { background: #FEF3E2; color: #8A5100; border-color: #F0BC72; }
  .pri-btn.p-high { background: #FDEEE7; color: #A53A10; border-color: #F0A07A; }
  .pri-btn.p-crit { background: #B91C1C; color: #fff;    border-color: #991A1A; }

  /* ── TOAST ─────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--text); color: #fff;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0; transform: translateY(8px);
    transition: opacity .2s, transform .2s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Mis<span>Tareas</span></div>
  <form class="add-form" id="addForm">
    <input type="text" id="taskInput" placeholder="Escribe una nueva tarea…" maxlength="200" autocomplete="off">
    <select id="colSelect">
      <option value="todo">Por hacer</option>
      <option value="progress">En progreso</option>
      <option value="done">Hecho</option>
    </select>
    <div class="priority-wrap">
      <label for="priInput">Prioridad</label>
      <input type="number" id="priInput" min="1" max="10" value="5">
    </div>
    <button class="btn-add" type="submit">+ Agregar</button>
  </form>
</header>

<div class="subbar">
  <p class="summary" id="summary"></p>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#5A9E72;border:1.5px solid #A8D5B5"></span> Baja (1–3)</span>
    <span class="legend-item"><span class="legend-dot" style="background:#D4920A;border:1.5px solid #F0BC72"></span> Media (4–6)</span>
    <span class="legend-item"><span class="legend-dot" style="background:#D0632A;border:1.5px solid #F0A07A"></span> Alta (7–9)</span>
    <span class="legend-item"><span class="legend-dot" style="background:#B91C1C"></span> Crítica (10)</span>
  </div>
</div>

<div class="board">
  <div class="column" data-col="todo"
       ondragover="onDragOver(event)" ondrop="onDrop(event,'todo')" ondragleave="onDragLeave(event)">
    <div class="col-header">
      <span class="col-dot"></span>
      <span class="col-title">Por hacer</span>
      <span class="col-count" id="cnt-todo">0</span>
    </div>
    <div class="task-list" id="list-todo"></div>
  </div>

  <div class="column" data-col="progress"
       ondragover="onDragOver(event)" ondrop="onDrop(event,'progress')" ondragleave="onDragLeave(event)">
    <div class="col-header">
      <span class="col-dot"></span>
      <span class="col-title">En progreso</span>
      <span class="col-count" id="cnt-progress">0</span>
    </div>
    <div class="task-list" id="list-progress"></div>
  </div>

  <div class="column" data-col="done"
       ondragover="onDragOver(event)" ondrop="onDrop(event,'done')" ondragleave="onDragLeave(event)">
    <div class="col-header">
      <span class="col-dot"></span>
      <span class="col-title">Hecho</span>
      <span class="col-count" id="cnt-done">0</span>
    </div>
    <div class="task-list" id="list-done"></div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── ESTADO ──────────────────────────────────── */
const KEY = 'mistareas_v1';
let tasks  = [];
let dragId = null;

const COL_LABELS = { todo: 'Por hacer', progress: 'En progreso', done: 'Hecho' };
const PRI_LABELS = {
  1:'Muy baja', 2:'Muy baja', 3:'Baja',
  4:'Media-baja', 5:'Media', 6:'Media-alta',
  7:'Alta', 8:'Alta', 9:'Muy alta', 10:'Crítica'
};

function load() {
  try { tasks = JSON.parse(localStorage.getItem(KEY)) || []; }
  catch { tasks = []; }
  tasks.forEach(t => { if (!t.priority) t.priority = 5; });
}
function save() { localStorage.setItem(KEY, JSON.stringify(tasks)); }
function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ── HELPERS DE PRIORIDAD ────────────────────── */
function priClass(p) {
  if (p <= 3) return 'pri-low';
  if (p <= 6) return 'pri-mid';
  if (p <= 9) return 'pri-high';
  return 'pri-crit';
}
function priBtnClass(p) {
  if (p <= 3) return 'p-low';
  if (p <= 6) return 'p-mid';
  if (p <= 9) return 'p-high';
  return 'p-crit';
}

/* ── ORDEN ───────────────────────────────────── */
function sortedTasks(col) {
  const colTasks = tasks.filter(t => t.col === col);
  if (col === 'done') return colTasks;           /* hecho: orden de entrada */
  return colTasks.slice().sort((a, b) => (b.priority || 5) - (a.priority || 5));
}

/* ── RENDER ──────────────────────────────────── */
function render() {
  ['todo','progress','done'].forEach(col => {
    const list     = document.getElementById('list-' + col);
    const colTasks = tasks.filter(t => t.col === col);
    document.getElementById('cnt-' + col).textContent = colTasks.length;
    list.innerHTML = '';
    if (colTasks.length === 0) {
      list.innerHTML = '<p class="empty-hint">Sin tareas aquí</p>';
      return;
    }
    sortedTasks(col).forEach(t => list.appendChild(makeCard(t)));
  });
  updateSummary();
}

function makeCard(t) {
  const p    = t.priority || 5;
  const card = document.createElement('div');
  card.className = 'task-card'
    + (t.col === 'done' ? ' is-done' : '')
    + (p === 10 && t.col !== 'done' ? ' crit-border' : '');
  card.draggable = true;
  card.dataset.id = t.id;

  card.addEventListener('dragstart', () => {
    dragId = t.id;
    setTimeout(() => card.classList.add('dragging'), 0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    dragId = null;
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
  });

  /* badge */
  const badge = document.createElement('div');
  badge.className = 'priority-badge ' + priClass(p);
  badge.textContent = p;
  badge.title = 'Prioridad ' + p + ' — ' + PRI_LABELS[p];

  /* cuerpo */
  const body = document.createElement('div');
  body.className = 'task-body';

  const text = document.createElement('span');
  text.className = 'task-text';
  text.textContent = t.text;

  const lbl = document.createElement('span');
  lbl.className = 'priority-label';
  lbl.textContent = PRI_LABELS[p];

  body.appendChild(text);
  body.appendChild(lbl);

  /* controles */
  const controls = document.createElement('div');
  controls.className = 'card-controls';

  /* — botón prioridad — */
  const priWrap = document.createElement('div');
  priWrap.className = 'pri-menu';

  const btnPri = document.createElement('button');
  btnPri.type = 'button';
  btnPri.className = 'btn-icon';
  btnPri.title = 'Cambiar prioridad';
  btnPri.textContent = '↑';

  const priDrop = document.createElement('div');
  priDrop.className = 'pri-dropdown';
  const grid = document.createElement('div');
  grid.className = 'pri-grid';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pri-btn ' + priBtnClass(i) + (i === p ? ' active' : '');
    btn.textContent = i;
    btn.title = 'Prioridad ' + i + ' — ' + PRI_LABELS[i];
    btn.addEventListener('click', e => {
      e.stopPropagation();
      changePriority(t.id, i);
      priDrop.classList.remove('open');
    });
    grid.appendChild(btn);
  }
  priDrop.appendChild(grid);

  btnPri.addEventListener('click', e => {
    e.stopPropagation();
    closeAllDropdowns(priDrop);
    priDrop.classList.toggle('open');
  });
  priWrap.appendChild(btnPri);
  priWrap.appendChild(priDrop);

  /* — botón mover — */
  const moveWrap = document.createElement('div');
  moveWrap.className = 'move-menu';

  const btnMove = document.createElement('button');
  btnMove.type = 'button';
  btnMove.className = 'btn-icon';
  btnMove.title = 'Mover a…';
  btnMove.textContent = '⇄';

  const moveDrop = document.createElement('div');
  moveDrop.className = 'move-dropdown';
  ['todo','progress','done'].forEach(col => {
    const opt = document.createElement('button');
    opt.type = 'button';
    opt.className = 'move-opt' + (col === t.col ? ' current' : '');
    opt.textContent = COL_LABELS[col];
    opt.addEventListener('click', e => {
      e.stopPropagation();
      moveTask(t.id, col);
      moveDrop.classList.remove('open');
    });
    moveDrop.appendChild(opt);
  });

  btnMove.addEventListener('click', e => {
    e.stopPropagation();
    closeAllDropdowns(moveDrop);
    moveDrop.classList.toggle('open');
  });
  moveWrap.appendChild(btnMove);
  moveWrap.appendChild(moveDrop);

  /* — botón eliminar — */
  const btnDel = document.createElement('button');
  btnDel.type = 'button';
  btnDel.className = 'btn-icon btn-del';
  btnDel.title = 'Eliminar';
  btnDel.textContent = '✕';
  btnDel.addEventListener('click', () => deleteTask(t.id));

  controls.appendChild(priWrap);
  controls.appendChild(moveWrap);
  controls.appendChild(btnDel);

  card.appendChild(badge);
  card.appendChild(body);
  card.appendChild(controls);
  return card;
}

/* ── ACCIONES ────────────────────────────────── */
function addTask(text, col, priority) {
  if (!text.trim()) return;
  tasks.push({ id: newId(), text: text.trim(), col, priority });
  save(); render();
  toast('Tarea agregada — prioridad ' + priority + ' ✓');
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
  toast('Tarea eliminada');
}

function moveTask(id, col) {
  const t = tasks.find(t => t.id === id);
  if (!t || t.col === col) return;
  t.col = col;
  save(); render();
  toast('Movida a «' + COL_LABELS[col] + '»');
}

function changePriority(id, priority) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.priority = priority;
  save(); render();
  toast('Prioridad → ' + priority + ' (' + PRI_LABELS[priority] + ')');
}

function updateSummary() {
  const total = tasks.length;
  const done  = tasks.filter(t => t.col === 'done').length;
  const crit  = tasks.filter(t => t.priority === 10 && t.col !== 'done').length;
  let msg = total === 0
    ? 'No hay tareas todavía.'
    : total + ' tarea' + (total !== 1 ? 's' : '') + ' · ' + done + ' completada' + (done !== 1 ? 's' : '');
  if (crit > 0) msg += ' · ' + crit + ' crítica' + (crit !== 1 ? 's' : '');
  document.getElementById('summary').textContent = msg;
}

/* ── DROPDOWNS ───────────────────────────────── */
function closeAllDropdowns(except) {
  document.querySelectorAll('.move-dropdown, .pri-dropdown').forEach(d => {
    if (d !== except) d.classList.remove('open');
  });
}
document.addEventListener('click', () => closeAllDropdowns(null));

/* ── VALIDAR INPUT PRIORIDAD ─────────────────── */
document.getElementById('priInput').addEventListener('blur', function() {
  let v = parseInt(this.value);
  if (isNaN(v) || v < 1) v = 1;
  if (v > 10) v = 10;
  this.value = v;
});

/* ── DRAG & DROP ─────────────────────────────── */
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, col) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragId) moveTask(dragId, col);
}

/* ── FORMULARIO ──────────────────────────────── */
document.getElementById('addForm').addEventListener('submit', e => {
  e.preventDefault();
  const input = document.getElementById('taskInput');
  const col   = document.getElementById('colSelect').value;
  let   pri   = parseInt(document.getElementById('priInput').value);
  if (isNaN(pri) || pri < 1) pri = 1;
  if (pri > 10) pri = 10;
  addTask(input.value, col, pri);
  input.value = '';
  input.focus();
});

/* ── TOAST ───────────────────────────────────── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* ── INIT ────────────────────────────────────── */
load();
render();
</script>
</body>
</html>
